<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Professionelle Baumpflege im Großraum Erfurt. Fällungen, Kronenpflege, Notdienst 24/7." />
  <title>Baumpflege F. Glüher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sticky Header ─────────────────────────────────────────────────────── -->
  <header id="site-header">
    <div class="container header-inner">

      <a href="#home" class="logo" aria-label="Zur Startseite">
        <!-- Logo-Bild wird per JS aus logo_url befüllt; hidden bis JS es setzt -->
        <img id="logo-img" src="" alt="" class="logo-img" hidden />
        <span id="header-firmenname">Baumpflege F. Glüher</span>
      </a>

      <button
        id="nav-toggle"
        aria-label="Navigation öffnen"
        aria-expanded="false"
        aria-controls="main-nav"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Impressum/Rechtliches ist NICHT in der Hauptnavigation – nur im Footer -->
      <nav id="main-nav" aria-label="Hauptnavigation">
        <a href="#home">Start</a>
        <a href="#ueber-uns">Über mich</a>
        <a href="#leistungen">Leistungen</a>
        <a href="#galerie">Galerie</a>
      </nav>

    </div>
  </header>

  <!-- ── Hero (nur #home) ───────────────────────────────────────────────────── -->
  <section id="hero" aria-label="Willkommen bei Baumpflege F. Glüher" hidden>
    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="container hero-inner">
      <h1 id="hero-titel"></h1>
      <p id="hero-subline"></p>
      <div class="hero-ctas">
        <a id="hero-cta-tel" href="#" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
          Jetzt anrufen
        </a>
        <a id="hero-cta-wa" href="#" class="btn btn-wa" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
      </div>
    </div>
  </section>

  <!-- ── App Viewport (dynamisch durch JS befüllt) ─────────────────────────── -->
  <main id="app-viewport" role="main" aria-live="polite" aria-atomic="true"></main>

  <!-- ── Footer – einziger Ort für Rechtliches ────────────────────────────── -->
  <footer id="site-footer">
    <div class="container footer-inner">
      <p id="footer-copy"></p>
      <nav class="footer-nav" aria-label="Rechtliche Links">
        <a href="#rechtliches">Impressum</a>
        <a href="#rechtliches">Datenschutz</a>
      </nav>
    </div>
  </footer>

  <!-- ── Sticky Mobile Action Bar ──────────────────────────────────────────── -->
  <div id="sticky-bar" role="complementary" aria-label="Schnellkontakt">
    <a id="sticky-tel" href="#" class="sticky-btn sticky-tel">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      <span>Anrufen</span>
    </a>
    <a id="sticky-wa" href="#" class="sticky-btn sticky-wa" target="_blank" rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WhatsApp</span>
    </a>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
